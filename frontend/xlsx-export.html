<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Test Agent — XLSX Export</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar__brand">
                <div>
                    <h2 class="sidebar__title">AI Test Agent</h2>
                </div>
            </div>

            <nav class="sidebar__nav">
                <a class="sidebar__link" href="./index.html">
                    <span>Отправка в TestIT</span>
                </a>
                <a class="sidebar__link sidebar__link--active" href="./xlsx-export.html">
                    <span>Генерация XLSX</span>
                </a>
            </nav>
        </aside>

        <main class="page-content">
            <section class="hero-card">
                <div class="hero-card__badge">XLSX export</div>
                <h1 class="hero-card__title">Формирование XLSX-файла</h1>
                <p class="hero-card__text">
                    Загрузите JSON-файл на сервер. В ответ сервер вернёт XLSX-файл,
                    который автоматически начнёт скачиваться в браузере.
                </p>
            </section>

            <section class="panel">
                <div class="panel__header">
                    <h2 class="panel__title">Загрузка JSON для XLSX</h2>
                    <p class="panel__description">После успешного ответа появится и ручная кнопка скачивания.</p>
                </div>

                <form class="upload-form" id="xlsx-upload-form">
                    <label class="file-input" for="xlsx-file-send">
                        <span class="file-input__caption">Выберите JSON-файл</span>

                        <input
                            type="file"
                            accept=".json,application/json"
                            name="file"
                            id="xlsx-file-send"
                            class="file-input__native"
                        >

                        <span class="file-input__button">Выбрать файл</span>
                        <span class="file-input__filename" id="xlsx-file-name">Файл не выбран</span>
                    </label>

                    <div class="button-row">
                        <button class="primary-button" id="xlsx-submit-btn" type="submit">
                            Создать XLSX
                        </button>
                        <button class="secondary-button" id="manual-download-btn" type="button" disabled>
                            Скачайте вручную, если автоматическое скачивание не началось
                        </button>
                    </div>
                </form>

                <div id="xlsx-status" class="status-box" aria-live="polite"></div>
            </section>
        </main>
    </div>

    <script src="./xlsx-script.js"></script>
</body>
</html>
